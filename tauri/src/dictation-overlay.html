<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dictation</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --panel: rgba(28, 28, 34, 0.96);
      --panel-edge: rgba(255, 255, 255, 0.08);
      --text: #f6f5f2;
      --text-secondary: rgba(238, 236, 231, 0.62);
      --accent: #79a9ff;
      --red: #ff6a5c;
      --green: #74d39a;
      --shadow:
        0 14px 28px rgba(0, 0, 0, 0.18),
        0 4px 10px rgba(0, 0, 0, 0.14),
        inset 0 1px 0 rgba(255,255,255,0.08);
    }

    html, body {
      width: 100%;
      height: 100%;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Helvetica Neue', sans-serif;
      background: transparent;
      overflow: hidden;
      -webkit-user-select: none;
      user-select: none;
    }

    .pill {
      display: flex;
      align-items: center;
      gap: 12px;
      width: 100%;
      height: 100%;
      padding: 12px 14px;
      background: var(--panel);
      border: 1px solid var(--panel-edge);
      border-radius: 20px;
      box-shadow: var(--shadow);
      animation: appear 200ms ease-out;
      transition: border-color 220ms ease, transform 220ms ease, box-shadow 220ms ease;
    }

    .pill.error {
      border-color: rgba(255, 106, 92, 0.45);
      box-shadow:
        0 14px 28px rgba(0, 0, 0, 0.18),
        0 4px 10px rgba(0, 0, 0, 0.14),
        0 0 0 1px rgba(255, 106, 92, 0.14),
        0 0 14px rgba(255, 106, 92, 0.08);
    }

    .pill.dismissing {
      animation: dismiss 150ms ease-out forwards;
    }

    @keyframes appear {
      from { opacity: 0; transform: translateY(10px) scale(0.985); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    @keyframes dismiss {
      from { opacity: 1; transform: translateY(0) scale(1); }
      to   { opacity: 0; transform: translateY(12px) scale(0.985); }
    }

    /* Status dot */
    .dot {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      flex-shrink: 0;
      background: var(--red);
      box-shadow:
        0 0 0 4px rgba(255, 106, 92, 0.16),
        0 0 16px rgba(255, 106, 92, 0.28);
    }

    .dot.blink {
      animation: pulse 1.6s ease-in-out infinite;
    }

    .dot.green {
      background: var(--green);
      box-shadow:
        0 0 0 4px rgba(116, 211, 154, 0.18),
        0 0 16px rgba(116, 211, 154, 0.28);
    }
    .dot.accent {
      background: var(--accent);
      box-shadow:
        0 0 0 4px rgba(121, 169, 255, 0.18),
        0 0 16px rgba(121, 169, 255, 0.28);
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(0.78); opacity: 0.48; }
    }

    /* Spinner */
    .spinner {
      width: 16px;
      height: 16px;
      border: 2px solid rgba(121, 169, 255, 0.18);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 1.0s linear infinite;
      flex-shrink: 0;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Label */
    .label {
      font-size: 16px;
      font-weight: 650;
      letter-spacing: -0.02em;
      color: var(--text);
      flex: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      transition: opacity 180ms ease, transform 180ms ease, filter 180ms ease;
    }

    /* Timer */
    .timer {
      font-size: 14px;
      font-weight: 600;
      color: var(--text-secondary);
      font-variant-numeric: tabular-nums;
      flex-shrink: 0;
      letter-spacing: 0.02em;
      transition: opacity 180ms ease, transform 180ms ease;
    }

    /* Waveform */
    .waveform {
      display: flex;
      align-items: center;
      gap: 3px;
      height: 16px;
      flex-shrink: 0;
      transition: opacity 180ms ease, transform 180ms ease;
    }

    .waveform .bar {
      width: 3px;
      background: linear-gradient(180deg, rgba(255,255,255,0.85), rgba(255,255,255,0.42));
      border-radius: 999px;
      transition: height 120ms ease, opacity 120ms ease;
      min-height: 5px;
      opacity: 0.75;
    }

    .soft-swap {
      opacity: 0.4;
      transform: translateY(2px);
      filter: blur(0.4px);
    }

    /* Error icon */
    .error-icon {
      font-size: 16px;
      color: var(--red);
      flex-shrink: 0;
    }

    /* Success icon */
    .success-icon {
      font-size: 16px;
      color: var(--green);
      flex-shrink: 0;
    }
  </style>
</head>
<body>
  <div class="pill" id="pill">
    <div class="dot blink" id="indicator"></div>
    <span class="label" id="label">Listening...</span>
    <div class="waveform" id="waveform" style="display:none">
      <div class="bar" style="height:4px"></div>
      <div class="bar" style="height:4px"></div>
      <div class="bar" style="height:4px"></div>
      <div class="bar" style="height:4px"></div>
      <div class="bar" style="height:4px"></div>
      <div class="bar" style="height:4px"></div>
      <div class="bar" style="height:4px"></div>
    </div>
    <span class="timer" id="timer" style="display:none">0:00</span>
  </div>

  <script>
    const { listen } = window.__TAURI__.event;

    const pill = document.getElementById('pill');
    const indicator = document.getElementById('indicator');
    const label = document.getElementById('label');
    const waveform = document.getElementById('waveform');
    const timer = document.getElementById('timer');
    const bars = waveform.querySelectorAll('.bar');
    const cues = {
      start: new Audio('audio/cue-start.wav'),
      stop: new Audio('audio/cue-stop.wav'),
      complete: new Audio('audio/cue-complete.wav'),
      error: new Audio('audio/cue-error.wav'),
    };

    let startTime = null;
    let timerInterval = null;
    let lastState = null;
    let sessionStarted = false;
    let terminalCuePlayed = false;

    Object.assign(cues.start, { volume: 0.18 });
    Object.assign(cues.stop, { volume: 0.16 });
    Object.assign(cues.complete, { volume: 0.18 });
    Object.assign(cues.error, { volume: 0.15 });

    function formatTime(secs) {
      const m = Math.floor(secs / 60);
      const s = Math.floor(secs % 60);
      return `${m}:${s.toString().padStart(2, '0')}`;
    }

    function startTimer() {
      startTime = Date.now();
      timerInterval = setInterval(() => {
        const elapsed = (Date.now() - startTime) / 1000;
        timer.textContent = formatTime(elapsed);
      }, 200);
    }

    function stopTimer() {
      if (timerInterval) clearInterval(timerInterval);
      timerInterval = null;
    }

    function playCue(name) {
      const cue = cues[name];
      if (!cue) return;
      try {
        cue.currentTime = 0;
        cue.play().catch(() => {});
      } catch (_) {}
    }

    function soften(el) {
      if (!el) return;
      el.classList.add('soft-swap');
      requestAnimationFrame(() => {
        setTimeout(() => el.classList.remove('soft-swap'), 32);
      });
    }

    // Listen for state changes from Tauri backend
    listen('dictation:state', (e) => {
      const state = e.payload;

      if (state !== lastState) {
        if ((state === 'listening' || state === 'accumulating') && !sessionStarted) {
          playCue('start');
          sessionStarted = true;
          terminalCuePlayed = false;
        }
        if (state === 'success' && !terminalCuePlayed) {
          playCue('complete');
          terminalCuePlayed = true;
        }
        if (state === 'error' && !terminalCuePlayed) {
          playCue('error');
          terminalCuePlayed = true;
        }
        lastState = state;
      }

      pill.classList.remove('error');
      stopTimer();
      soften(label);
      soften(timer);
      soften(waveform);

      switch (state) {
        case 'listening':
          indicator.className = 'dot blink';
          indicator.style.display = '';
          label.textContent = 'Listening...';
          waveform.style.display = 'none';
          timer.style.display = 'none';
          // Remove spinner if present
          document.getElementById('spin')?.remove();
          break;

        case 'accumulating':
          indicator.className = 'dot';
          indicator.style.display = '';
          label.textContent = 'Dictating';
          waveform.style.display = 'flex';
          timer.style.display = '';
          document.getElementById('spin')?.remove();
          startTimer();
          break;

        case 'processing':
          indicator.style.display = 'none';
          waveform.style.display = 'none';
          timer.style.display = 'none';
          // Add spinner
          if (!document.getElementById('spin')) {
            const sp = document.createElement('div');
            sp.className = 'spinner';
            sp.id = 'spin';
            pill.insertBefore(sp, label);
          }
          label.textContent = 'Transcribing...';
          break;

        case 'success':
          indicator.style.display = 'none';
          waveform.style.display = 'none';
          timer.style.display = 'none';
          document.getElementById('spin')?.remove();
          // Show success icon
          if (!document.getElementById('success-ic')) {
            const ic = document.createElement('span');
            ic.className = 'success-icon';
            ic.id = 'success-ic';
            ic.textContent = '\u2713';
            pill.insertBefore(ic, label);
          }
          label.textContent = 'Copied';
          // Auto-dismiss after 2s
          setTimeout(() => dismiss(), 2000);
          break;

        case 'error':
          pill.classList.add('error');
          indicator.style.display = 'none';
          waveform.style.display = 'none';
          timer.style.display = 'none';
          document.getElementById('spin')?.remove();
          if (!document.getElementById('error-ic')) {
            const ic = document.createElement('span');
            ic.className = 'error-icon';
            ic.id = 'error-ic';
            ic.textContent = '\u2715';
            pill.insertBefore(ic, label);
          }
          label.textContent = 'Failed \u2014 audio saved';
          setTimeout(() => dismiss(), 4000);
          break;

        case 'cancelled':
        case 'yielded':
          dismiss();
          break;
      }
    });

    // Listen for audio level updates (waveform animation)
    listen('dictation:level', (e) => {
      const level = e.payload; // 0-100
      const normalized = level / 100;
      bars.forEach((bar, i) => {
        // Create varied heights based on position and level
        const variance = Math.sin((i / bars.length) * Math.PI + Date.now() / 200) * 0.3 + 0.7;
        const h = 4 + normalized * 12 * variance;
        bar.style.height = `${Math.max(4, Math.min(16, h))}px`;
      });
    });

    function dismiss() {
      pill.classList.add('dismissing');
      setTimeout(() => {
        window.__TAURI__.window.getCurrentWindow().close();
      }, 150);
    }

    // Esc key cancels
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') {
        window.__TAURI__.core.invoke('cmd_stop_dictation').catch(() => {});
        dismiss();
      }
    });
  </script>
</body>
</html>
