name: Welcome

on:
  issues:
    types: [opened]
  pull_request_target:
    types: [opened]

permissions:
  issues: write
  pull-requests: write

jobs:
  welcome:
    runs-on: ubuntu-latest
    steps:
      - name: Welcome new contributor
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;

            if (context.eventName === 'issues') {
              const issue = context.payload.issue;

              // Check if this is the user's first issue
              const { data: issues } = await github.rest.issues.listForRepo({
                owner,
                repo,
                creator: issue.user.login,
                state: 'all',
              });
              // includes the current issue, so first-timer has exactly 1
              if (issues.length > 1) return;

              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: issue.number,
                body: [
                  `Hey @${issue.user.login}, thanks for opening this! 👋`,
                  '',
                  'Minutes is actively maintained and we read every issue.',
                  'If you\'re interested in tackling this yourself, check out [CONTRIBUTING.md](../blob/main/CONTRIBUTING.md) to get started.',
                  '',
                  'We\'ll take a look soon.',
                ].join('\n'),
              });
            }

            if (context.eventName === 'pull_request_target') {
              const pr = context.payload.pull_request;

              // Check if this is the user's first PR
              const { data: prs } = await github.rest.pulls.list({
                owner,
                repo,
                state: 'all',
              });
              const userPrs = prs.filter(p => p.user.login === pr.user.login);
              if (userPrs.length > 1) return;

              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: pr.number,
                body: [
                  `Thanks for this PR, @${pr.user.login}! 🎉`,
                  '',
                  'A maintainer will review it soon. We typically look at PRs within a few days.',
                  'If CI passes and the change looks good, we\'ll merge it in.',
                  '',
                  'Appreciate you contributing to Minutes!',
                ].join('\n'),
              });
            }
